annotations:
  artifacthub.io/category: storage
  artifacthub.io/changes: |
    - kind: fixed
      description: Enable persistence by default to prevent data loss on pod restart.
    - kind: fixed
      description: Add liveness and readiness probes for automatic failure recovery.
    - kind: added
      description: Support environment variables (PUID, PGID, UMASK, RUN_ARIA2, TZ).
    - kind: added
      description: Add optional HTTPS port (5245) support.
    - kind: added
      description: Document AList image variants (-aio, -ffmpeg, -aria2).
    - kind: changed
      description: Change inMemory.enabled default from true to false.
    - kind: changed
      description: Update service configuration to use ports.http/https structure.
    - kind: changed
      description: Rewrite README with comprehensive documentation and examples.
