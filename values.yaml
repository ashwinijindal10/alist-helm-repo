# Default values for alist.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: xhofe/alist
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  # Available tags:
  #   v3.60.0           - Default stable version
  #   v3.60.0-aio       - All-in-one with ffmpeg + aria2
  #   v3.60.0-ffmpeg    - With ffmpeg for thumbnail generation
  #   v3.60.0-aria2     - With aria2 for offline downloads
  #   latest            - Latest stable
  #   beta              - Development version
  tag: "v3.60.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations:
  {}
  # Configure pod labels and annotations for monitoring/telemetry
  # Example: prometheus.io/scrape: "true"

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  ports:
    http:
      port: 80
      targetPort: 5244
      enabled: true
    https:
      port: 443
      targetPort: 5245
      enabled: false

ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

## Override the deployment namespace
##
namespaceOverride: ""
## Deployment labels
labels: {}
## Deployment annotations
annotations: {}

## Enable persistence using Persistent Volume Claims
## ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
##
persistence:
  type: pvc
  enabled: true
  storageClassName: default
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  # annotations: {}
  finalizers:
    - kubernetes.io/pvc-protection
  # selectorLabels: {}
  ## Sub-directory of the PV to mount. Can be templated.
  # subPath: ""
  ## Name of an existing PVC. Can be templated.
  # existingClaim:
  ## Extra labels to apply to a PVC.
  extraPvcLabels: {}

  ## If persistence is not enabled, this allows to mount the
  ## local storage in-memory to improve performance
  ##
  inMemory:
    enabled: false
    ## The maximum usage on memory medium EmptyDir would be
    ## the minimum value between the SizeLimit specified
    ## here and the sum of memory limits of all containers in a pod
    ##
    # sizeLimit: 300Mi

## Pod port name - used for both HTTP and HTTPS probes
podPortName: alist

## Environment variables for the AList container
## Supported: PUID, PGID, UMASK, RUN_ARIA2, TZ
## Examples:
##   PUID: "0"          - Container process UID (0 = root)
##   PGID: "0"          - Container process GID (0 = root)
##   UMASK: "022"       - File creation mask (octal)
##   RUN_ARIA2: "true"  - Enable aria2 daemon (only with -aria2 image variant)
##   TZ: "UTC"          - Timezone (e.g., Asia/Shanghai, Europe/London)
env: {}
  # PUID: "0"
  # PGID: "0"
  # UMASK: "022"
  # TZ: "UTC"
createConfigFile:
  ## If true, config.json will be written from .Values.config at startup.
  ## Leave disabled to let AList generate its full default config on first run.
  ##
  enabled: false
  image:
    repository: docker.io/library/busybox
    tag: "latest"
    pullPolicy: IfNotPresent

test:
  image:
    repository: docker.io/library/busybox
    tag: "latest"
    pullPolicy: IfNotPresent

## AList configuration (only used when createConfigFile.enabled=true)
##
## IMPORTANT: By default, createConfigFile.enabled=false, which means AList will
## automatically generate a full config.json on first startup. This section is only
## used if you explicitly enable createConfigFile.enabled=true.
##
## Values in this map are converted to JSON format.
## Ref: https://alist.nn.ci/guide/config/configuration.html
##
config:
  site_url: ""
  database:
    type: sqlite3
    host: ""
    port: 0
    user: ""
    password: ""
    name: ""
    db_file: data/data.db
    table_prefix: x_
    ssl_mode: ""
    dsn: ""
