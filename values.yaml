# Default values for alist.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: xhofe/alist
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  # Available tags:
  #   v3.60.0           - Default stable version
  #   v3.60.0-aio       - All-in-one with ffmpeg + aria2
  #   v3.60.0-ffmpeg    - With ffmpeg for thumbnail generation
  #   v3.60.0-aria2     - With aria2 for offline downloads
  #   latest            - Latest stable
  #   beta              - Development version
  tag: "v3.60.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations:
  {}
  # Configure pod labels and annotations for monitoring/telemetry
  # Example: prometheus.io/scrape: "true"

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  ports:
    http:
      port: 80
      targetPort: 5244
      enabled: true
    https:
      port: 443
      targetPort: 5245
      enabled: false

ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

## Override the deployment namespace
##
namespaceOverride: ""
## Deployment labels
labels: {}
## Deployment annotations
annotations: {}

## Enable persistence using Persistent Volume Claims
## ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
##
persistence:
  type: pvc
  enabled: true
  storageClassName: default
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  # annotations: {}
  finalizers:
    - kubernetes.io/pvc-protection
  # selectorLabels: {}
  ## Sub-directory of the PV to mount. Can be templated.
  # subPath: ""
  ## Name of an existing PVC. Can be templated.
  # existingClaim:
  ## Extra labels to apply to a PVC.
  extraPvcLabels: {}

  ## If persistence is not enabled, this allows to mount the
  ## local storage in-memory to improve performance
  ##
  inMemory:
    enabled: false
    ## The maximum usage on memory medium EmptyDir would be
    ## the minimum value between the SizeLimit specified
    ## here and the sum of memory limits of all containers in a pod
    ##
    # sizeLimit: 300Mi

## Pod port name - used for both HTTP and HTTPS probes
podPortName: alist

## Environment variables for the AList container
## Specify as a key-value map. Values can be strings or numbers.
env: {}
  # PUID: "0"
  # PGID: "0"
  # UMASK: "022"
  # RUN_ARIA2: "true"
  # TZ: "UTC"

################################################################################
## SECURITY CONFIGURATION
################################################################################
security:
  ## JWT token secret for authentication (generate with: openssl rand -base64 32)
  jwtSecret: ""
  
  ## Admin password (initial login, will be prompted on first startup if not set)
  adminPassword: ""
  
  ## Force HTTPS redirect (requires TLS certificate)
  forceHttps: false
  
  ## TLS certificate configuration
  tls:
    enabled: false

################################################################################
## DATABASE CONFIGURATION
################################################################################
database:
  ## Database type: sqlite3 (default), mysql, postgres
  type: sqlite3
  
  ## SQLite configuration (default)
  sqlite:
    path: data/data.db
  
  ## Remote database (MySQL/PostgreSQL)
  remote:
    enabled: false
    # type: mysql
    # host: db.example.com
    # port: 3306
    # user: alist
    # password: ""
    # database: alist
    # sslMode: ""
    # tablePrefix: x_

################################################################################
## PROTOCOL SUPPORT
################################################################################
protocols:
  ## WebDAV protocol support
  webdav:
    enabled: true
    
  ## FTP/SFTP support
  ftp:
    enabled: false
  
  sftp:
    enabled: false
  
  ## S3-compatible API support
  s3:
    enabled: false

################################################################################
## PERFORMANCE & LIMITS
################################################################################
performance:
  ## Connection limits
  maxConnections: 100
  maxConcurrency: 50
  
  ## Device/Session management
  maxDevices: 10
  deviceSessionTtl: 2592000
  
  ## Rate limiting (0 = unlimited)
  streamMaxClientDownloadSpeed: 0
  streamMaxClientUploadSpeed: 0
  streamMaxServerDownloadSpeed: 0
  
  ## Task workers
  taskWorkers:
    download: 2
    upload: 2
    copy: 2
    decompress: 1

################################################################################
## LOGGING CONFIGURATION
################################################################################
logging:
  enabled: true
  level: "info"
  maxSize: 10
  maxBackups: 5
  maxAge: 30

################################################################################
## ACCESS CONTROL
################################################################################
access:
  ## Default guest permissions (bitmask)
  guestPermission: 7
  
  ## CORS support
  cors:
    enabled: false
################################################################################
## ADVANCED: Manual config.json Creation
################################################################################
createConfigFile:
  ## WARNING: Only enable if you need to override auto-generated config
  ##
  enabled: false
  image:
    repository: docker.io/library/busybox
    tag: "latest"
    pullPolicy: IfNotPresent

test:
  image:
    repository: docker.io/library/busybox
    tag: "latest"
    pullPolicy: IfNotPresent

## Full AList configuration (JSON format, only used if createConfigFile.enabled=true)
## Reference: https://alist.nn.ci/guide/config/configuration.html
##
config:
  site_url: ""
  site_title: "AList"
  max_connections: 100
  max_concurrency: 50
  jwt_secret: ""
  log:
    enable: true
    name: ""
    level: ""
    max_size: 10
    max_backups: 5
    max_age: 30
  database:
    type: sqlite3
    host: ""
    port: 0
    user: ""
    password: ""
    name: ""
    db_file: data/data.db
    table_prefix: x_
    ssl_mode: ""
    dsn: ""
