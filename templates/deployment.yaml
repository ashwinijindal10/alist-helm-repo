apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alist.fullname" . }}
  namespace: {{ include "alist.namespace" . }}
  labels:
    {{- include "alist.labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.annotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "alist.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "alist.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "alist.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.createConfigFile.enabled }}
      initContainers:
        - name: init-config
          image: "{{ .Values.createConfigFile.image.repository }}:{{ .Values.createConfigFile.image.tag }}"
          imagePullPolicy: {{ .Values.createConfigFile.image.pullPolicy }}
          command:
            # - ["/bin/sh", "-c", "cp /config.json /data/config.json"]
            - cp
            - /config.json
            - /data/config.json
          volumeMounts:
            - name: config
              mountPath: "/config.json"
              subPath: config.json
            - name: storage
              mountPath: "/data"
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            {{- if .Values.service.ports.http.enabled }}
            - name: http
              containerPort: {{ .Values.service.ports.http.targetPort }}
              protocol: TCP
            {{- end }}
            {{- if .Values.service.ports.https.enabled }}
            - name: https
              containerPort: {{ .Values.service.ports.https.targetPort }}
              protocol: TCP
            {{- end }}
          env:
            {{- if .Values.security.jwtSecret }}
            - name: JWT_SECRET
              value: {{ .Values.security.jwtSecret | quote }}
            {{- end }}
            {{- if .Values.security.adminPassword }}
            - name: ADMIN_PASSWORD
              value: {{ .Values.security.adminPassword | quote }}
            {{- end }}
            {{- if .Values.security.forceHttps }}
            - name: FORCE_HTTPS
              value: "true"
            {{- end }}
            {{- if eq .Values.database.type "mysql" }}
            - name: DB_TYPE
              value: "mysql"
            - name: DB_HOST
              value: {{ .Values.database.remote.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.remote.port | quote }}
            - name: DB_USER
              value: {{ .Values.database.remote.user | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.database.remote.password | quote }}
            - name: DB_NAME
              value: {{ .Values.database.remote.database | quote }}
            {{- else if eq .Values.database.type "postgres" }}
            - name: DB_TYPE
              value: "postgres"
            - name: DB_HOST
              value: {{ .Values.database.remote.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.remote.port | quote }}
            - name: DB_USER
              value: {{ .Values.database.remote.user | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.database.remote.password | quote }}
            - name: DB_NAME
              value: {{ .Values.database.remote.database | quote }}
            - name: DB_SSL_MODE
              value: {{ .Values.database.remote.sslMode | quote }}
            {{- end }}
            {{- if .Values.protocols.webdav.enabled }}
            - name: WEBDAV_ENABLE
              value: "true"
            {{- end }}
            {{- if .Values.protocols.ftp.enabled }}
            - name: FTP_ENABLE
              value: "true"
            {{- end }}
            {{- if .Values.protocols.sftp.enabled }}
            - name: SFTP_ENABLE
              value: "true"
            {{- end }}
            {{- if .Values.protocols.s3.enabled }}
            - name: S3_ENABLE
              value: "true"
            {{- end }}
            - name: MAX_CONNECTIONS
              value: {{ .Values.performance.maxConnections | quote }}
            - name: MAX_CONCURRENCY
              value: {{ .Values.performance.maxConcurrency | quote }}
            - name: MAX_DEVICES
              value: {{ .Values.performance.maxDevices | quote }}
            - name: DEVICE_SESSION_TTL
              value: {{ .Values.performance.deviceSessionTtl | quote }}
            {{- if gt .Values.performance.streamMaxClientDownloadSpeed 0.0 }}
            - name: STREAM_MAX_CLIENT_DOWNLOAD_SPEED
              value: {{ .Values.performance.streamMaxClientDownloadSpeed | quote }}
            {{- end }}
            {{- if gt .Values.performance.streamMaxClientUploadSpeed 0.0 }}
            - name: STREAM_MAX_CLIENT_UPLOAD_SPEED
              value: {{ .Values.performance.streamMaxClientUploadSpeed | quote }}
            {{- end }}
            {{- if .Values.logging.enabled }}
            - name: LOG_ENABLE
              value: "true"
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            - name: LOG_MAX_SIZE
              value: {{ .Values.logging.maxSize | quote }}
            - name: LOG_MAX_BACKUPS
              value: {{ .Values.logging.maxBackups | quote }}
            - name: LOG_MAX_AGE
              value: {{ .Values.logging.maxAge | quote }}
            {{- end }}
            {{- if .Values.access.cors.enabled }}
            - name: CORS_ENABLED
              value: "true"
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v3/server/info
              port: {{ .Values.service.ports.http.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v3/server/info
              port: {{ .Values.service.ports.http.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: storage
              mountPath: "/opt/alist/data"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if .Values.createConfigFile.enabled }}
        - name: config
          configMap:
            name: {{ include "alist.fullname" . }}
        {{- end}}
        {{- if and .Values.persistence.enabled (eq .Values.persistence.type "pvc") }}
        - name: storage
          persistentVolumeClaim:
            claimName: {{ tpl (.Values.persistence.existingClaim | default (include "alist.fullname" .)) . }}
        {{- else }}
        - name: storage
          {{- if .Values.persistence.inMemory.enabled }}
          emptyDir:
            medium: Memory
            {{- with .Values.persistence.inMemory.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}


