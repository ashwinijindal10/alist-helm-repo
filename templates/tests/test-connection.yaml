apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "alist.fullname" . }}-test-connection"
  namespace: {{ include "alist.namespace" . }}
  labels:
    {{- include "alist.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: "{{ .Values.test.image.repository }}:{{ .Values.test.image.tag }}"
      imagePullPolicy: {{ .Values.test.image.pullPolicy }}
      command: ['wget']
      args: ['http://{{ include "alist.fullname" . }}:{{ .Values.service.port }}/']
  restartPolicy: Never
